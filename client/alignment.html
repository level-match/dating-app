<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alignment Assessment — LEVEL</title>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: var(--bg-deep, #060C18); color: var(--cream-50, #FBF7EE); min-height: 100vh; }
    .ae-wrap { max-width: 760px; margin: 0 auto; padding: 120px 24px 80px; }
    .ae-head { text-align: center; margin-bottom: 40px; }
    .ae-head h1 { font-family: var(--font-serif); font-weight: 300; font-size: clamp(1.8rem, 4vw, 2.4rem); margin: 0 0 12px; }
    .ae-head p { font-family: var(--font-sans); font-weight: 300; color: rgba(255,255,255,0.6); line-height: 1.7; max-width: 520px; margin: 0 auto; }
    .ae-progress { margin-bottom: 32px; }
    .ae-progress-track { height: 4px; background: rgba(255,255,255,0.08); border-radius: 99px; overflow: hidden; }
    .ae-progress-fill { height: 100%; width: 0; background: linear-gradient(90deg, #C9A227, #E8C7A0); transition: width .35s ease; }
    .ae-progress-meta { display: flex; justify-content: space-between; margin-top: 10px; font-family: var(--font-sans); font-size: 0.78rem; color: rgba(255,255,255,0.45); }
    .ae-category { border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 24px; margin-bottom: 20px; background: rgba(255,255,255,0.02); }
    .ae-category.is-complete { border-color: rgba(201,162,39,0.35); }
    .ae-category-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 20px; }
    .ae-cat-num { font-family: var(--font-sans); font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.4); }
    .ae-cat-name { font-family: var(--font-serif); font-size: 1.25rem; font-weight: 300; margin-top: 4px; }
    .ae-question { margin-bottom: 24px; }
    .ae-question-prompt { font-family: var(--font-sans); font-size: 0.95rem; line-height: 1.6; margin-bottom: 12px; }
    .ae-options { display: flex; flex-direction: column; gap: 8px; }
    .ae-option { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; cursor: pointer; transition: border-color .2s, background .2s; }
    .ae-option:hover { border-color: rgba(255,255,255,0.18); background: rgba(255,255,255,0.03); }
    .ae-option.selected { border-color: rgba(201,162,39,0.55); background: rgba(201,162,39,0.08); }
    .ae-option-radio { width: 16px; height: 16px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.25); margin-top: 3px; flex-shrink: 0; }
    .ae-option.selected .ae-option-radio { border-color: #E8C7A0; background: #E8C7A0; box-shadow: inset 0 0 0 3px #1A1408; }
    .ae-option-label { display: block; font-family: var(--font-sans); font-size: 0.9rem; font-weight: 500; }
    .ae-option-desc { display: block; font-family: var(--font-sans); font-size: 0.78rem; font-weight: 300; color: rgba(255,255,255,0.5); margin-top: 4px; line-height: 1.5; }
    .ae-option-value { display: none; }
    .ae-submit-wrap { text-align: center; margin-top: 32px; }
    .ae-results { display: none; margin-top: 48px; }
    .ae-results.visible { display: block; }
    .ae-peer-grid { display: flex; flex-direction: column; gap: 16px; margin-top: 24px; }
    .ae-peer-card { display: flex; justify-content: space-between; gap: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; }
    .ae-peer-name { font-family: var(--font-serif); font-size: 1.1rem; }
    .ae-peer-role { font-family: var(--font-sans); font-size: 0.78rem; color: rgba(255,255,255,0.45); margin-top: 4px; }
    .ae-peer-score-num { font-family: var(--font-serif); font-size: 2rem; color: #E8C7A0; }
  </style>
</head>
<body>
  <div id="mainNav"></div>
  <main class="ae-wrap">
    <header class="ae-head">
      <h1>Alignment Assessment</h1>
      <p>Answer a short set of questions so LEVEL can curate introductions that reflect your values, lifestyle, and relationship intent.</p>
    </header>
    <div class="ae-progress">
      <div class="ae-progress-track"><div class="ae-progress-fill" id="aeProgressFill"></div></div>
      <div class="ae-progress-meta">
        <span id="aeProgressText">0 of 9 answered</span>
        <span id="aeProgressPct">0%</span>
      </div>
    </div>
    <div id="aeCategories"></div>
    <div class="ae-submit-wrap">
      <button type="button" class="btn btn-gold btn-lg" id="aeSubmit" disabled>Save &amp; preview alignment</button>
      <p style="margin-top:16px;font-family:var(--font-sans);font-size:0.82rem;color:rgba(255,255,255,0.45);">
        Required before curated matches are delivered.
      </p>
    </div>
    <section class="ae-results" id="aeResults">
      <h2 style="font-family:var(--font-serif);font-weight:300;text-align:center;">Sample alignment preview</h2>
      <div class="ae-peer-grid" id="aePeerGrid"></div>
      <div style="text-align:center;margin-top:32px;">
        <a href="matches.html" class="btn btn-gold">View your matches</a>
      </div>
    </section>
  </main>
  <script type="module" src="js/alignment.js"></script>
  <script type="module">
    import { initSidebar } from './js/sidebar.js'
    initSidebar({ active: 'matches' })
  </script>
</body>
</html>
