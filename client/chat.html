<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LEVEL — Messages</title>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <style>
    body { overflow: hidden; height: 100vh; }

    .chat-layout {
      display: grid;
      grid-template-columns: var(--sidebar-width) 320px 1fr 300px;
      height: 100vh;
      overflow: hidden;
    }

    /* ─── App Sidebar ─── */
    .app-sidebar {
      background: rgba(1,15,36,0.85);
      display: flex;
      flex-direction: column;
      padding: var(--s-6) var(--s-4);
      border-right: 1px solid rgba(255,255,255,0.04);
      overflow: hidden;
    }

    .sidebar-logo {
      font-family: var(--font-serif);
      font-size: var(--text-2xl);
      font-weight: 500;
      letter-spacing: var(--tracking-widest);
      color: var(--cream-50);
      padding: var(--s-3) var(--s-4);
      margin-bottom: var(--s-8);
    }


    .sidebar-user {
      display: flex;
      align-items: center;
      gap: var(--s-3);
      padding: var(--s-3) var(--s-4);
      border-radius: var(--radius-md);
    }

    /* ─── Conversation List ─── */
    .conv-panel {
      background: rgba(255,255,255,0.04);
      border-right: 1px solid var(--border-light);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .conv-header {
      padding: var(--s-5) var(--s-6);
      border-bottom: 1px solid var(--border-light);
    }

    .conv-header-title {
      font-family: var(--font-serif);
      font-size: var(--text-2xl);
      font-weight: 400;
      color: var(--charcoal);
    }

    .conv-search {
      position: relative;
      margin-top: var(--s-4);
    }

    .conv-search-icon {
      position: absolute;
      left: var(--s-4);
      top: 50%;
      transform: translateY(-50%);
      color: var(--slate-400);
      font-size: 14px;
    }

    .conv-search input {
      width: 100%;
      padding: 10px 16px 10px 38px;
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      font-weight: 300;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-full);
      outline: none;
      color: var(--charcoal);
    }

    .conv-search input:focus {
      border-color: var(--ocean-500);
      background: rgba(255,255,255,0.04);
    }

    .conv-filter-tabs {
      display: flex;
      gap: var(--s-1);
      padding: var(--s-3) var(--s-6);
      border-bottom: 1px solid var(--border-light);
    }

    .conv-filter-tab {
      flex: 1;
      text-align: center;
      padding: 7px;
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border-radius: var(--radius-full);
      cursor: pointer;
      transition: all var(--dur-fast);
      color: var(--text-muted);
    }

    .conv-filter-tab.active {
      background: rgba(1,15,36,0.72);
      color: var(--cream-50);
    }

    .conv-list {
      flex: 1;
      overflow-y: auto;
    }

    .conv-item {
      display: flex;
      align-items: center;
      gap: var(--s-4);
      padding: var(--s-4) var(--s-6);
      cursor: pointer;
      transition: background var(--dur-fast);
      position: relative;
      border-bottom: 1px solid var(--border-light);
    }

    .conv-item:hover { background: rgba(255,255,255,0.05); }
    .conv-item.active { background: rgba(255,255,255,0.08); }

    .conv-avatar {
      position: relative;
      flex-shrink: 0;
    }

    .conv-avatar-img {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      overflow: hidden;
    }

    .conv-online-dot {
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 12px;
      height: 12px;
      background: #22C55E;
      border-radius: 50%;
      border: 2px solid var(--cream-50);
    }

    .conv-body { flex: 1; min-width: 0; }

    .conv-name-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .conv-name {
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--charcoal);
    }

    .conv-time {
      font-family: var(--font-sans);
      font-size: 11px;
      color: var(--slate-300);
    }

    .conv-preview {
      margin-top: 2px;
      font-family: var(--font-sans);
      font-size: var(--text-xs);
      font-weight: 300;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .conv-unread-dot {
      width: 8px;
      height: 8px;
      background: var(--ocean-500);
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Request items */
    .conv-item.request .conv-avatar-img {
      border: 2px solid rgba(212,168,67,0.40);
    }

    /* ─── Chat Main ─── */
    .chat-main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: rgba(255,255,255,0.04);
    }

    .chat-topbar {
      padding: 0 var(--s-8);
      height: 72px;
      border-bottom: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .chat-topbar-user {
      display: flex;
      align-items: center;
      gap: var(--s-4);
    }

    .chat-topbar-name {
      font-family: var(--font-serif);
      font-size: var(--text-xl);
      font-weight: 400;
      color: var(--charcoal);
    }

    .chat-topbar-info {
      font-family: var(--font-sans);
      font-size: var(--text-xs);
      color: var(--text-muted);
      margin-top: 2px;
    }

    .chat-topbar-actions {
      display: flex;
      align-items: center;
      gap: var(--s-2);
    }

    .chat-topbar-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all var(--dur-fast);
      color: var(--slate-600);
      font-size: 16px;
    }

    .chat-topbar-btn:hover {
      background: rgba(255,255,255,0.08);
      color: var(--charcoal);
    }

    /* Messages area */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: var(--s-8);
      display: flex;
      flex-direction: column;
      gap: var(--s-4);
    }

    .chat-date-divider {
      display: flex;
      align-items: center;
      gap: var(--s-4);
      margin: var(--s-4) 0;
    }

    .chat-date-divider::before,
    .chat-date-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-light);
    }

    .chat-date-label {
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--slate-300);
      white-space: nowrap;
    }

    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: var(--s-3);
    }

    .msg-row.sent { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
    }

    .msg-content {
      max-width: 65%;
      display: flex;
      flex-direction: column;
      gap: var(--s-1);
    }

    .msg-row.sent .msg-content { align-items: flex-end; }

    .msg-bubble-text {
      padding: 12px 18px;
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      font-weight: 300;
      line-height: 1.6;
      border-radius: 20px;
    }

    .msg-row.received .msg-bubble-text {
      background: rgba(255,255,255,0.08);
      color: var(--charcoal);
      border-bottom-left-radius: 4px;
    }

    .msg-row.sent .msg-bubble-text {
      background: rgba(1,15,36,0.72);
      color: var(--cream-50);
      border-bottom-right-radius: 4px;
    }

    .msg-time {
      font-family: var(--font-sans);
      font-size: 10px;
      color: var(--slate-300);
      padding-inline: var(--s-2);
    }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      align-items: flex-end;
      gap: var(--s-3);
    }

    .typing-bubble {
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      border-bottom-left-radius: 4px;
      padding: 12px 18px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--slate-400);
      animation: typingFade 1.8s ease-in-out infinite;
    }

    /* Calm opacity-only fade — no scale bounce — for a quiet "is typing" cue */
    @keyframes typingFade {
      0%, 100% { opacity: 0.25; }
      50%      { opacity: 0.7; }
    }

    .typing-dot:nth-child(2) { animation-delay: 0.25s; }
    .typing-dot:nth-child(3) { animation-delay: 0.5s; }

    /* Chat Input */
    .chat-input-area {
      padding: var(--s-5) var(--s-8);
      border-top: 1px solid var(--border-light);
      flex-shrink: 0;
    }

    .chat-input-row {
      display: flex;
      align-items: flex-end;
      gap: var(--s-3);
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border-mid);
      border-radius: 24px;
      padding: var(--s-3) var(--s-5);
      transition: border-color var(--dur-fast);
    }

    .chat-input-row:focus-within {
      border-color: var(--ocean-500);
      background: rgba(255,255,255,0.04);
    }

    .chat-input-field {
      flex: 1;
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      font-weight: 300;
      color: var(--charcoal);
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      max-height: 120px;
      line-height: 1.6;
    }

    .chat-input-field::placeholder { color: var(--slate-300); }

    .chat-input-actions {
      display: flex;
      align-items: center;
      gap: var(--s-2);
    }

    .chat-attach-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--slate-400);
      font-size: 16px;
      transition: all var(--dur-fast);
    }

    .chat-attach-btn:hover { color: var(--charcoal); }

    .chat-send-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(1,15,36,0.72);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--cream-50);
      font-size: 14px;
      transition: all var(--dur-normal) var(--ease-elegant);
      flex-shrink: 0;
    }

    .chat-send-btn:hover {
      background: rgba(1,15,36,0.60);
      transform: scale(1.05);
    }

    .chat-input-extras {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: var(--s-3);
    }

    .chat-input-hint {
      font-family: var(--font-sans);
      font-size: 11px;
      color: var(--slate-300);
    }

    /* Restaurant booking CTA in chat */
    .chat-booking-cta {
      margin: var(--s-4) 0;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-xl);
      padding: var(--s-5) var(--s-6);
      display: flex;
      align-items: center;
      gap: var(--s-4);
    }

    /* ─── Profile Panel ─── */
    .profile-panel {
      background: rgba(255,255,255,0.04);
      border-left: 1px solid var(--border-light);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .profile-panel-header {
      padding: var(--s-5) var(--s-6);
      border-bottom: 1px solid var(--border-light);
      font-family: var(--font-sans);
      font-size: var(--text-xs);
      font-weight: 500;
      letter-spacing: var(--tracking-wider);
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .profile-panel-portrait {
      height: 280px;
      overflow: hidden;
      position: relative;
    }

    .profile-panel-content {
      padding: var(--s-6);
      display: flex;
      flex-direction: column;
      gap: var(--s-5);
    }

    .pp-name {
      font-family: var(--font-serif);
      font-size: var(--text-2xl);
      font-weight: 400;
      color: var(--charcoal);
    }

    .pp-role {
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      font-weight: 300;
      color: var(--text-muted);
      margin-top: var(--s-1);
    }

    .pp-compat-score {
      background: rgba(255,255,255,0.05);
      border-radius: var(--radius-lg);
      padding: var(--s-4);
      text-align: center;
    }

    .pp-section-label {
      font-family: var(--font-sans);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: var(--s-3);
    }

    .pp-tags {
      display: flex;
      flex-wrap: wrap;
      gap: var(--s-2);
    }

    /* Connection Request UI (Pending state) */
    .connection-request-banner {
      background: rgba(212,168,67,0.06);
      border: 1px solid rgba(212,168,67,0.25);
      border-radius: var(--radius-xl);
      padding: var(--s-6);
      margin: var(--s-6);
      text-align: center;
    }

    .crb-title {
      font-family: var(--font-serif);
      font-size: var(--text-xl);
      font-weight: 400;
      color: var(--charcoal);
      margin-bottom: var(--s-2);
    }

    .crb-desc {
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      font-weight: 300;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: var(--s-6);
    }

    /* Locked input state */
    .chat-locked {
      background: rgba(255,255,255,0.05);
      border-top: 1px solid var(--border-light);
      padding: var(--s-6) var(--s-8);
      text-align: center;
    }

    @media (max-width: 1400px) {
      .chat-layout { grid-template-columns: var(--sidebar-width) 300px 1fr; }
      .profile-panel { display: none; }
    }

    @media (max-width: 1100px) {
      /* Sidebar is off-screen via components.css; remove its grid column */
      .chat-layout { grid-template-columns: 300px 1fr; }
    }

    @media (max-width: 1024px) {
      /* Sidebar column removed — sidebar floats as overlay via components.css */
      .chat-layout { grid-template-columns: 300px 1fr; }
      /* Override the global transform rule — in chat, sidebar is fixed overlay */
      .app-sidebar {
        position: fixed;
        top: 0; left: 0; bottom: 0;
        width: 280px;
        z-index: 200;
      }
    }

    @media (max-width: 768px) {
      body { overflow: hidden; }
      .chat-layout { grid-template-columns: 1fr; }
      .conv-panel { display: none; }
      .chat-main { display: flex; }
      .chat-topbar { padding: 0 var(--s-4); height: 60px; }
      .chat-topbar-name { font-size: var(--text-base); }
      .chat-topbar-info { display: none; }
      .chat-messages { padding: var(--s-4); }
      .msg-content { max-width: 80%; }
      .chat-input-area { padding: var(--s-3) var(--s-4); }
      .chat-back-btn { display: flex; }
    }

    @media (max-width: 480px) {
      .chat-topbar { padding: 0 var(--s-3); }
      .chat-messages { padding: var(--s-3); gap: var(--s-3); }
      .msg-content { max-width: 88%; }
      .msg-bubble-text { padding: 10px 14px; font-size: var(--text-xs); }
      .chat-input-area { padding: var(--s-2) var(--s-3); }
    }
  </style>
</head>
<body>
  <div class="bg-glows">
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div class="bg-glow bg-glow-3"></div>
    <div class="bg-glow bg-glow-4"></div>
  </div>
  <div class="chat-layout" style="position:relative;z-index:1;">

    <!-- ═══ APP SIDEBAR ═══ -->
    <aside class="app-sidebar"></aside>

    <!-- ═══ CONVERSATION LIST ═══ -->
    <div class="conv-panel">
      <div class="conv-header">
        <div class="conv-header-title">Messages</div>
        <div class="conv-search">
          <div class="conv-search-icon">⌕</div>
          <input type="text" placeholder="Search conversations...">
        </div>
      </div>

      <div class="conv-filter-tabs">
        <div class="conv-filter-tab active" data-filter="all">All</div>
        <div class="conv-filter-tab" data-filter="requests">Requests</div>
        <div class="conv-filter-tab" data-filter="active">Active</div>
      </div>

      <div class="conv-list" id="convList"></div>
    </div>

    <!-- ═══ CHAT MAIN ═══ -->
    <div class="chat-main" id="chatMain">
      <div class="chat-empty-state" id="chatEmptyState">
        <div style="max-width:380px;text-align:center;padding:var(--s-12);">
          <div style="font-size:42px;margin-bottom:var(--s-4);opacity:0.5;">✉</div>
          <div style="font-family:var(--font-serif);font-size:1.6rem;font-weight:300;color:var(--cream-50);letter-spacing:-0.01em;margin-bottom:var(--s-3);">
            Select a conversation
          </div>
          <div style="font-family:var(--font-sans);font-size:0.92rem;font-weight:300;color:rgba(255,255,255,0.55);line-height:1.7;">
            Your connections and incoming requests will appear here once you start matching.
          </div>
        </div>
      </div>
    </div>

    <!-- ═══ PROFILE PANEL ═══ -->
    <div class="profile-panel" id="profilePanel" style="display:none;"></div>

  </div>

  <script src="/js/loading-init.js"></script>
  <script src="/js/sidebar.js"></script>
  <script type="module" src="/js/chat.js"></script>
</body>
</html>
