<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LEVEL — Profile</title>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <style>
    body { }

    .app-layout {
      min-height: 100vh;
    }

    .app-sidebar {
      background: rgba(1,15,36,0.85);
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: var(--sidebar-width);
      display: flex;
      flex-direction: column;
      padding: var(--s-6) var(--s-4);
      z-index: 100;
      border-right: 1px solid rgba(255,255,255,0.04);
    }

    .sidebar-logo {
      font-family: var(--font-serif);
      font-size: var(--text-2xl);
      font-weight: 500;
      letter-spacing: var(--tracking-widest);
      color: var(--cream-50);
      padding: var(--s-3) var(--s-4);
      margin-bottom: var(--s-8);
    }


    .app-main { margin-left: var(--sidebar-width); }

    /* ─── Profile Layout ─── */
    .profile-wrapper {
      display: grid;
      grid-template-columns: 360px 1fr;
      min-height: calc(100vh - 0px);
    }

    /* Left: Portrait sidebar */
    .profile-portrait-col {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: hidden;
    }

    .portrait-bg-container {
      width: 100%;
      height: 100%;
      background:
        radial-gradient(ellipse at 50% 25%, rgba(255,230,200,0.07) 0%, transparent 50%),
        linear-gradient(180deg, #1A2F4A 0%, #0D1E35 20%, #1E1008 60%, #140C06 100%);
      position: relative;
    }

    .portrait-light-effect {
      position: absolute;
      top: 10%;
      left: 50%;
      transform: translateX(-50%);
      width: 70%;
      height: 40%;
      background: radial-gradient(ellipse, rgba(255,255,255,0.06) 0%, transparent 70%);
      border-radius: 50%;
    }

    .portrait-figure {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 65%;
      height: 75%;
      background: radial-gradient(ellipse at 50% 5%,
        rgba(200,160,120,0.10) 0%,
        rgba(150,110,80,0.06) 35%,
        transparent 70%
      );
      border-radius: 50% 50% 0 0;
    }

    .portrait-gradient-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        transparent 50%,
        rgba(3,6,15,0.75) 85%,
        rgba(3,6,15,0.97) 100%
      );
    }

    .portrait-nav-back {
      position: absolute;
      top: var(--s-6);
      left: var(--s-6);
      display: flex;
      align-items: center;
      gap: var(--s-2);
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      color: rgba(255,255,255,0.55);
      cursor: pointer;
      transition: color var(--dur-fast);
      z-index: 10;
    }

    .portrait-nav-back:hover { color: rgba(255,255,255,0.90); }

    .portrait-score {
      position: absolute;
      top: var(--s-6);
      right: var(--s-6);
      background: rgba(6,12,26,0.80);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(212,168,67,0.30);
      border-radius: var(--radius-lg);
      padding: var(--s-3) var(--s-4);
      text-align: center;
    }

    .portrait-score-num {
      font-family: var(--font-serif);
      font-size: var(--text-3xl);
      font-weight: 300;
      color: var(--gold-400);
      line-height: 1;
    }

    .portrait-score-label {
      font-family: var(--font-sans);
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-top: 2px;
    }

    .portrait-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: var(--s-8);
    }

    .portrait-name {
      font-family: var(--font-serif);
      font-size: var(--text-5xl);
      font-weight: 300;
      color: var(--cream-50);
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .portrait-role {
      margin-top: var(--s-2);
      font-family: var(--font-sans);
      font-size: var(--text-base);
      font-weight: 300;
      color: rgba(255,255,255,0.55);
    }

    .portrait-meta {
      display: flex;
      gap: var(--s-4);
      margin-top: var(--s-4);
      padding-top: var(--s-4);
      border-top: 1px solid rgba(255,255,255,0.10);
    }

    .portrait-meta-item {
      font-family: var(--font-sans);
      font-size: var(--text-xs);
      color: rgba(255,255,255,0.40);
      display: flex;
      align-items: center;
      gap: var(--s-2);
    }

    /* Photo strip */
    .portrait-photos {
      display: flex;
      gap: var(--s-2);
      margin-top: var(--s-4);
    }

    .portrait-thumb {
      width: 52px;
      height: 68px;
      border-radius: var(--radius-md);
      overflow: hidden;
      border: 1.5px solid rgba(255,255,255,0.08);
      cursor: pointer;
      transition: all var(--dur-fast);
    }

    .portrait-thumb:hover { border-color: rgba(212,168,67,0.40); }
    .portrait-thumb.active { border-color: rgba(212,168,67,0.60); }

    .portrait-actions {
      display: flex;
      gap: var(--s-3);
      margin-top: var(--s-5);
    }

    /* ─── Right: Details col ─── */
    .profile-detail-col {
      background: rgba(1, 15, 36, 0.62);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      padding: var(--s-10) var(--s-12);
      overflow-y: auto;
    }

    .profile-section {
      padding-bottom: var(--s-10);
      border-bottom: 1px solid var(--border-light);
      margin-bottom: var(--s-10);
    }

    .profile-section:last-child {
      border-bottom: none;
      margin-bottom: 0;
    }

    .profile-section-label {
      font-family: var(--font-sans);
      font-size: var(--text-xs);
      font-weight: 500;
      letter-spacing: var(--tracking-widest);
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: var(--s-5);
    }

    /* Compat breakdown */
    .compat-breakdown {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-2xl);
      padding: var(--s-8);
      margin-bottom: var(--s-6);
    }

    .compat-big-score {
      text-align: center;
      margin-bottom: var(--s-6);
    }

    .compat-score-ring-container {
      position: relative;
      display: inline-flex;
    }

    .compat-bars-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--s-4);
    }

    .compat-bar-item {
      display: flex;
      flex-direction: column;
      gap: var(--s-2);
    }

    .compat-bar-label {
      display: flex;
      justify-content: space-between;
      font-family: var(--font-sans);
      font-size: var(--text-xs);
      color: var(--text-secondary);
    }

    /* Q&A */
    .qa-item {
      display: flex;
      flex-direction: column;
      gap: var(--s-2);
      padding-block: var(--s-5);
      border-bottom: 1px solid var(--border-light);
    }

    .qa-item:last-child { border-bottom: none; }

    .qa-q {
      font-family: var(--font-sans);
      font-size: var(--text-xs);
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--gold-600);
    }

    .qa-a {
      font-family: var(--font-serif);
      font-size: var(--text-xl);
      font-weight: 400;
      color: var(--text-primary);
      line-height: 1.5;
    }

    /* Values grid */
    .values-grid {
      display: flex;
      flex-wrap: wrap;
      gap: var(--s-2);
    }

    /* Portrait photo layer (real image when available) */
    .portrait-photo {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center 22%;
    }

    /* ─── Overview ─── */
    .pf-quote {
      font-family: var(--font-serif);
      font-size: var(--text-xl);
      font-style: italic;
      line-height: 1.7;
      color: var(--charcoal);
    }
    .pf-para {
      font-family: var(--font-sans);
      font-size: var(--text-base);
      font-weight: 300;
      line-height: 1.8;
      color: var(--text-secondary);
      margin-top: var(--s-4);
    }

    /* Lead statement (legacy, intent, mobility) */
    .pf-lead {
      font-family: var(--font-serif);
      font-size: var(--text-2xl);
      font-weight: 400;
      line-height: 1.45;
      color: var(--text-primary);
    }
    .pf-lead-sub {
      font-family: var(--font-sans);
      font-size: var(--text-base);
      font-weight: 300;
      line-height: 1.7;
      color: var(--text-secondary);
      margin-top: var(--s-4);
    }

    /* Career journey timeline */
    .pf-timeline { display: flex; flex-direction: column; gap: var(--s-5); }
    .pf-tl-item { display: flex; gap: var(--s-5); }
    .pf-tl-marker {
      flex-shrink: 0;
      width: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 6px;
    }
    .pf-tl-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--gold-400);
      box-shadow: 0 0 0 4px rgba(212,165,116,0.12);
    }
    .pf-tl-line { flex: 1; width: 1px; background: var(--border-mid); margin-top: 6px; }
    .pf-tl-item:last-child .pf-tl-line { display: none; }
    .pf-tl-role {
      font-family: var(--font-serif);
      font-size: var(--text-xl);
      font-weight: 400;
      color: var(--text-primary);
    }
    .pf-tl-org {
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      color: var(--text-gold);
      margin-top: 2px;
    }
    .pf-tl-period {
      font-family: var(--font-sans);
      font-size: var(--text-xs);
      color: var(--text-muted);
      margin-top: 2px;
      letter-spacing: 0.04em;
    }
    .pf-tl-note {
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      font-weight: 300;
      color: var(--text-secondary);
      margin-top: var(--s-2);
    }

    /* Labelled row lists (lifestyle, relationship, mobility) */
    .pf-rows { display: flex; flex-direction: column; gap: 0; }
    .pf-row {
      display: flex;
      gap: var(--s-5);
      padding-block: var(--s-4);
      border-bottom: 1px solid var(--border-light);
    }
    .pf-row:last-child { border-bottom: none; }
    .pf-row-label {
      flex-shrink: 0;
      width: 132px;
      font-family: var(--font-sans);
      font-size: var(--text-xs);
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding-top: 2px;
    }
    .pf-row-value {
      font-family: var(--font-sans);
      font-size: var(--text-md);
      font-weight: 300;
      color: var(--text-primary);
    }

    /* Principles */
    .pf-principles { display: flex; flex-direction: column; gap: var(--s-3); margin-top: var(--s-5); }
    .pf-principle {
      display: flex;
      gap: var(--s-3);
      align-items: baseline;
      font-family: var(--font-serif);
      font-size: var(--text-lg);
      color: var(--text-primary);
    }
    .pf-principle::before {
      content: '';
      flex-shrink: 0;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--gold-400);
      transform: translateY(-3px);
    }

    /* Shared alignment indicators */
    .pf-shared { display: grid; grid-template-columns: 1fr 1fr; gap: var(--s-4); }
    .pf-shared-item {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-lg);
      padding: var(--s-5);
    }
    .pf-shared-label {
      display: flex; align-items: center; gap: var(--s-2);
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--text-primary);
    }
    .pf-shared-check { color: var(--jade-500, #7BB59B); flex-shrink: 0; }
    .pf-shared-note {
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      font-weight: 300;
      color: var(--text-secondary);
      margin-top: var(--s-2);
      line-height: 1.5;
    }

    /* Verification & trust */
    .pf-verify-notes { display: flex; flex-direction: column; gap: var(--s-3); margin-top: var(--s-5); }
    .pf-verify-note {
      display: flex; gap: var(--s-3); align-items: center;
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      color: var(--text-secondary);
    }
    .pf-verify-note svg { width: 16px; height: 16px; color: var(--jade-500, #7BB59B); flex-shrink: 0; }

    /* Big compatibility score (fixed for dark theme) */
    .compat-big-num {
      font-family: var(--font-serif);
      font-size: 5rem;
      font-weight: 300;
      color: var(--text-primary);
      line-height: 1;
    }
    .compat-big-num span { font-size: 2.5rem; color: var(--text-muted); }
    .compat-bar-pct { color: var(--text-gold); font-weight: 500; }
    .compat-track {
      height: 4px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
    }
    .compat-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--gold-600), var(--gold-400));
      transition: width 0.9s var(--ease-elegant);
    }

    @media (max-width: 768px) {
      .pf-shared { grid-template-columns: 1fr; }
    }

    @media (max-width: 1100px) {
      :root { --sidebar-width: 0px; }
      .app-sidebar { display: none; }
      .app-main { margin-left: 0; }
    }

    @media (max-width: 768px) {
      .profile-wrapper { grid-template-columns: 1fr; }
      .profile-portrait-col { position: relative; height: 70vh; }
      .profile-detail-col { padding: var(--s-6) var(--s-5); }
    }
  </style>
</head>
<body>
  <div class="bg-glows">
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div class="bg-glow bg-glow-3"></div>
    <div class="bg-glow bg-glow-4"></div>
  </div>
  <div class="app-layout" style="position:relative;z-index:1;">
    <!-- Sidebar -->
    <aside class="app-sidebar"></aside>

    <main class="app-main">
      <div class="profile-wrapper">

        <!-- ═══ LEFT: Portrait ═══ -->
        <div class="profile-portrait-col">
          <div class="portrait-bg-container">
            <div class="portrait-photo" id="portraitPhoto"></div>
            <div class="portrait-light-effect"></div>
            <div class="portrait-figure"></div>
            <div class="portrait-gradient-overlay"></div>

            <!-- Nav back -->
            <a href="matches.html" class="portrait-nav-back" id="navBack">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round"/></svg>
              <span id="navBackLabel">Match Dashboard</span>
            </a>

            <!-- Match score + profile info (rendered by js/profile.js) -->
            <div class="portrait-score" id="portraitScore"></div>
            <div class="portrait-info" id="portraitInfo"></div>
          </div>
        </div>

        <!-- ═══ RIGHT: Details (rendered by js/profile.js) ═══ -->
        <div class="profile-detail-col">
          <div id="profileDetail"></div>
        </div>
      </div>
    </main>
  </div>
  <script src="/js/sidebar.js"></script>
  <script type="module" src="/js/profile.js"></script>
</body>
</html>
