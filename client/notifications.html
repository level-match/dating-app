<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LEVEL — Notifications</title>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <style>
    body { overflow-x: hidden; }
    .app-layout { min-height: 100vh; }

    .app-sidebar {
      background: rgba(1,15,36,0.85);
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: var(--sidebar-width);
      display: flex;
      flex-direction: column;
      padding: var(--s-6) var(--s-4);
      z-index: 100;
      border-right: 1px solid rgba(255,255,255,0.04);
    }

    .app-main { margin-left: var(--sidebar-width); min-height: 100vh; }

    .app-topbar {
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid var(--border-light);
      padding: 0 var(--s-10);
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(18px);
    }

    .topbar-title {
      font-family: var(--font-serif);
      font-size: 1.4rem;
      font-weight: 400;
      color: var(--cream-50);
      letter-spacing: -0.01em;
    }

    .app-content { padding: var(--s-10) var(--s-12) var(--s-16); max-width: 940px; }

    .notif-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: var(--s-6);
      margin-bottom: var(--s-10);
      flex-wrap: wrap;
    }
    .notif-eyebrow {
      display: inline-flex; align-items: center; gap: 12px;
      font-family: var(--font-sans);
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold-300);
      margin-bottom: 14px;
      font-weight: 500;
    }
    .notif-eyebrow::before {
      content: '';
      width: 32px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-400));
    }
    .notif-title {
      font-family: var(--font-serif);
      font-size: clamp(2.2rem, 4vw, 3.4rem);
      font-weight: 300;
      color: var(--cream-50);
      letter-spacing: -0.025em;
      line-height: 1.05;
    }
    .notif-title em {
      font-family: 'Instrument Serif','Fraunces',Georgia,serif;
      font-style: italic;
      background: linear-gradient(135deg, var(--gold-300), var(--gold-400));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .notif-subtitle {
      margin-top: 12px;
      font-family: var(--font-sans);
      font-size: 0.96rem;
      font-weight: 300;
      color: rgba(255,255,255,0.55);
      max-width: 540px;
      line-height: 1.7;
    }

    .notif-actions { display: flex; gap: 10px; align-items: center; }
    .notif-mark-all {
      padding: 10px 20px;
      border-radius: 999px;
      background: transparent;
      color: rgba(255,255,255,0.65);
      border: 1px solid rgba(255,255,255,0.14);
      font-family: var(--font-sans);
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.25s;
    }
    .notif-mark-all:hover {
      background: rgba(212,168,67,0.08);
      border-color: rgba(212,168,67,0.42);
      color: var(--gold-300);
    }
    .notif-mark-all:disabled { opacity: 0.4; cursor: not-allowed; }

    .notif-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: var(--s-6);
      flex-wrap: wrap;
    }
    .notif-tab {
      padding: 8px 18px;
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      font-family: var(--font-sans);
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      cursor: pointer;
      transition: all 0.2s;
    }
    .notif-tab.active {
      background: rgba(212,168,67,0.10);
      border-color: rgba(212,168,67,0.42);
      color: var(--gold-300);
    }
    .notif-tab:not(.active):hover {
      background: rgba(255,255,255,0.06);
      color: var(--cream-50);
    }
    .notif-tab .count {
      margin-left: 6px;
      padding: 1px 7px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      font-size: 0.66rem;
    }
    .notif-tab.active .count {
      background: rgba(212,168,67,0.22);
      color: var(--gold-200);
    }

    .notif-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .notif-card {
      position: relative;
      display: grid;
      grid-template-columns: 56px 1fr auto;
      gap: 20px;
      padding: 22px 26px;
      border-radius: 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      backdrop-filter: blur(14px);
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
      animation: fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) both;
    }
    .notif-card:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.055);
      border-color: rgba(212,168,67,0.32);
      box-shadow: 0 14px 40px rgba(0,0,0,0.32),
                  0 0 28px rgba(212,168,67,0.06);
    }

    .notif-card.unread::before {
      content: '';
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 4px;
      height: 70%;
      background: linear-gradient(180deg, var(--ocean-300), var(--ocean-500));
      border-radius: 999px;
      box-shadow: 0 0 14px rgba(85,226,233,0.45);
    }

    .notif-icon {
      width: 48px; height: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 18px;
    }
    .notif-icon.match    { background: linear-gradient(135deg, rgba(212,168,67,0.22), rgba(212,168,67,0.08)); color: var(--gold-300); border: 1px solid rgba(212,168,67,0.32); }
    .notif-icon.message  { background: linear-gradient(135deg, rgba(4,150,199,0.22), rgba(4,150,199,0.08)); color: #55E2E9; border: 1px solid rgba(85,226,233,0.32); }
    .notif-icon.request  { background: linear-gradient(135deg, rgba(180,140,220,0.22), rgba(180,140,220,0.08)); color: #C8B0E8; border: 1px solid rgba(180,140,220,0.32); }
    .notif-icon.view     { background: linear-gradient(135deg, rgba(255,255,255,0.10), rgba(255,255,255,0.03)); color: rgba(255,255,255,0.85); border: 1px solid rgba(255,255,255,0.14); }
    .notif-icon.concierge{ background: linear-gradient(135deg, rgba(123,181,155,0.22), rgba(123,181,155,0.08)); color: #9BCBB4; border: 1px solid rgba(123,181,155,0.32); }
    .notif-icon.system   { background: linear-gradient(135deg, rgba(212,168,67,0.18), rgba(184,168,212,0.12)); color: var(--gold-200); border: 1px solid rgba(212,168,67,0.28); }

    .notif-body { min-width: 0; }
    .notif-card-title {
      font-family: var(--font-serif);
      font-size: 1.05rem;
      font-weight: 400;
      color: var(--cream-50);
      letter-spacing: -0.005em;
      margin-bottom: 4px;
      line-height: 1.3;
    }
    .notif-card.read .notif-card-title { color: rgba(255,255,255,0.70); }
    .notif-card-text {
      font-family: var(--font-sans);
      font-size: 0.88rem;
      font-weight: 300;
      color: rgba(255,255,255,0.60);
      line-height: 1.6;
    }
    .notif-card.read .notif-card-text { color: rgba(255,255,255,0.42); }

    .notif-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      flex-shrink: 0;
    }
    .notif-time {
      font-family: var(--font-sans);
      font-size: 0.7rem;
      letter-spacing: 0.04em;
      color: rgba(255,255,255,0.45);
      white-space: nowrap;
    }
    .notif-type-pill {
      display: inline-flex;
      align-items: center;
      padding: 2px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.10);
      font-family: var(--font-sans);
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
    }

    /* Empty */
    .notif-empty {
      text-align: center;
      padding: 100px 24px;
      background: rgba(255,255,255,0.025);
      border: 1px dashed rgba(255,255,255,0.10);
      border-radius: 24px;
    }
    .notif-empty-orb {
      width: 80px; height: 80px;
      margin: 0 auto 28px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 30%, rgba(255,255,255,0.18) 0%, transparent 50%),
        linear-gradient(135deg, rgba(4,150,199,0.30), rgba(2,54,123,0.40));
      box-shadow: 0 0 40px rgba(4,150,199,0.22);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }
    .notif-empty h3 {
      font-family: var(--font-serif);
      font-size: 1.6rem;
      font-weight: 300;
      color: var(--cream-50);
      letter-spacing: -0.015em;
      margin-bottom: 10px;
    }
    .notif-empty p {
      font-family: var(--font-sans);
      font-size: 0.92rem;
      color: rgba(255,255,255,0.55);
      max-width: 380px;
      margin: 0 auto;
      line-height: 1.7;
      font-weight: 300;
    }

    @media (max-width: 1024px) {
      .app-main { margin-left: 0; }
      .app-content { padding: var(--s-6); }
      .notif-card { grid-template-columns: 48px 1fr; }
      .notif-meta { grid-column: 1 / -1; flex-direction: row; align-items: center; justify-content: space-between; }
    }

    @media (max-width: 768px) {
      body { overflow-x: hidden; }
      .app-main { margin-left: 0; }
      .app-topbar { padding: 0 var(--s-4); height: 60px; }
      .topbar-title { font-size: var(--text-xl); }
      .app-content { padding: var(--s-4); }
      .notif-card { grid-template-columns: 40px 1fr; gap: var(--s-3); padding: var(--s-4); }
      .notif-meta { flex-direction: row; align-items: center; gap: var(--s-2); }
    }

    @media (max-width: 480px) {
      .app-content { padding: var(--s-3); }
      .notif-card { grid-template-columns: 36px 1fr; padding: var(--s-3); }
    }
  </style>
</head>
<body>
  <div class="bg-glows">
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div class="bg-glow bg-glow-3"></div>
    <div class="bg-glow bg-glow-4"></div>
  </div>

  <div class="app-layout" style="position:relative;z-index:1;">
    <aside class="app-sidebar"></aside>

    <main class="app-main">
      <div class="app-topbar">
        <div class="topbar-title">Notifications</div>
        <div class="notif-actions">
          <button id="markAllBtn" class="notif-mark-all" onclick="markAllRead()">Mark all as read</button>
        </div>
      </div>

      <div class="app-content">
        <div class="notif-header">
          <div>
            <div class="notif-eyebrow">Updates</div>
            <h1 class="notif-title">
              Everything that<br>
              <em>happened while you were away.</em>
            </h1>
            <p class="notif-subtitle">
              Matches, messages, profile views, and concierge updates — all in one
              quiet feed. We never push noise to you.
            </p>
          </div>
        </div>

        <div class="notif-tabs">
          <div class="notif-tab active" onclick="setNotifTab(this, 'all')">
            All <span class="count" id="cntAll">0</span>
          </div>
          <div class="notif-tab" onclick="setNotifTab(this, 'unread')">
            Unread <span class="count" id="cntUnread">0</span>
          </div>
          <div class="notif-tab" onclick="setNotifTab(this, 'match')">Matches</div>
          <div class="notif-tab" onclick="setNotifTab(this, 'message')">Messages</div>
          <div class="notif-tab" onclick="setNotifTab(this, 'concierge')">Concierge</div>
          <div class="notif-tab" onclick="setNotifTab(this, 'system')">System</div>
        </div>

        <div id="notifList" class="notif-list"></div>
      </div>
    </main>
  </div>

  <script src="/js/sidebar.js"></script>
  <script type="module" src="/js/notifications.js"></script>
</body>
</html>
